[activation]
#scripts = ["install/setup.bash"]

[pypi-dependencies]
vcstool = ">=0.3.0, <0.4"
cmake = "==3.22.1"

[activation.env]
GAZEBO_SUPPRESS_EOL_WARNING = "1"
ROS_LOCALHOST_ONLY = "0"
