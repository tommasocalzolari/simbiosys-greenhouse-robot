bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    odom_topic: /mirte_base_controller/odom
    # Match the MIRTE ros2_control controller_manager update rate.
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: progress_checker
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.03
      movement_time_allowance: 18.0

    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.1  # accept the final goal within 15 cm
      yaw_goal_tolerance: 0.1 # accept the final heading within about 8.6 degrees

      stateful: true

    FollowPath:
      plugin: nav2_rotation_shim_controller::RotationShimController
      primary_controller: dwb_core::DWBLocalPlanner
      # Rotate in place to align with the first part of the global path before driving.
      angular_dist_threshold: 0.3       # rad; align to path already from ~14 deg heading error
      angular_disengage_threshold: 0.1  #makes the robot rotate until heading error is small
      forward_sampling_distance: 0.25    # m; look only a short distance ahead in this small map
      rotate_to_heading_angular_vel: 0.69 # rad/s; approximately 25% above the original tuning
      # DWB's min_speed_theta does not apply while this shim performs initial/final turns.
      # At 10 Hz, 7.5 rad/s^2 can reach the requested turn speed in one step.
      max_angular_accel: 7.5
      # Ramp from the previous command; measured odometry stays zero below the dead zone.
      closed_loop: false
      simulate_ahead_time: 0.6
      rotate_to_goal_heading: true
      debug_trajectory_details: false
      min_vel_x: 0.0        # avoid very small forward commands; backup is handled by the BackUp behavior
      min_vel_y: -0.35         # allow rightward strafing at the shared minimum speed
      max_vel_x: 0.325         # approximately 25% above the original tuning
      max_vel_y: 0.35          # allow leftward strafing at the shared minimum speed
      max_vel_theta: 1.25      # stronger turns in tight spaces
      # Shared minimum translational magnitude for forward/backward and left/right motion.
      min_speed_xy: 0.20
      max_speed_xy: 0.325      # cap combined x/y speed while still allowing lateral motion
      min_speed_theta: 0.5625   # 25% above the observed 0.45 rad/s rotational minimum
      acc_lim_x: 0.50
      acc_lim_y: 0.45         # lateral acceleration limit for smooth strafing
      acc_lim_theta: 2.0       # stronger angular acceleration for initial turns/corners
      decel_lim_x: -0.44       # firmer braking without being abrupt
      decel_lim_y: -0.375      # lateral braking limit
      decel_lim_theta: -1.25   # stronger angular deceleration for corners
      vx_samples: 12
      vy_samples: 7            # sample lateral trajectories instead of only forward/turning
      vtheta_samples: 32
      sim_time: 0.9
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.10
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.06
      PathAlign.scale: 8.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 6.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 14.0
      GoalDist.scale: 12.0
      RotateToGoal.scale: 12.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 8.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.20  # measured center-to-farthest-wheel distance
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true
          obstacle_min_range: 0.10
          obstacle_max_range: 2.5
          raytrace_min_range: 0.10
          raytrace_max_range: 3.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.22  # must be at least as large as the robot radius
        cost_scaling_factor: 7.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      robot_radius: 0.20  # measured center-to-farthest-wheel distance
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.25
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: nav2_smac_planner/SmacPlanner2D
      tolerance: 0.25
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 5.0 #3.2
      use_final_approach_orientation: false
      smoother:
        tolerance: 1.0e-10
        max_iterations: 1000
        w_data: 0.10
        w_smooth: 0.55
        do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 1.0
    max_rotational_vel: 1.25
    min_rotational_vel: 0.5625
    rotational_acc_lim: 2.5
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    wait:
      plugin: nav2_behaviors/Wait

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
